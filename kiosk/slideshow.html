<!DOCTYPE html>
<html lang="ja" class="kiosk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ご家族 — SmartSenior</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SmartSenior" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#0071e3" />
    <link rel="stylesheet" href="css/style.css?v=3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="css/kiosk.css?v=18" />
    <script src="js/config.js"></script>
    <style>
      /* ── Slideshow nav bar ─────────────────────────────────────────────── */
      .sld-nav {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 88px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: rgba(250, 249, 246, 0.9);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-top: 1px solid rgba(0,0,0,0.08);
        z-index: 20;
        gap: 16px;
      }

      .sld-nav-btn {
        height: 56px;
        min-width: 140px;
        padding: 0 24px;
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--color-text);
        background: #fff;
        border: 1.5px solid var(--color-border);
        border-radius: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        cursor: pointer;
        transition: background 0.12s ease, opacity 0.12s ease;
        flex-shrink: 0;
      }
      .sld-nav-btn:disabled { opacity: 0.3; cursor: default; }
      .sld-nav-btn:not(:disabled):active { background: rgba(0,0,0,0.05); }

      .sld-counter {
        flex: 1;
        text-align: center;
        font-size: 1.1rem;
        font-weight: 500;
        color: var(--color-text-muted);
        letter-spacing: 0.05em;
      }

      .sld-details-btn {
        height: 56px;
        padding: 0 28px;
        font-size: 1.05rem;
        font-weight: 600;
        color: #fff;
        background: var(--color-accent);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: background 0.12s ease;
        flex-shrink: 0;
      }
      .sld-details-btn:active { filter: brightness(0.9); }

      /* Move back button to top-left (profile default is bottom-left) */
      .slideshow-page .m-btn-back {
        top: 24px;
        bottom: auto;
        left: 32px;
      }

      /* Extra padding so content doesn't hide behind the nav bar */
      .slideshow-page .m-stage {
        padding-bottom: 104px;
      }

      /* Slide swap — transition duration is set per-direction in JS */
      .m-stage { transition: opacity 0.4s ease; }
    </style>
  </head>
  <body class="profile-page slideshow-page lang-ja">

    <button class="m-btn-back" id="snavBack">◀ 戻る</button>
    <button class="m-btn-end"  id="snavEnd">参拝終了</button>

    <div class="p-loader" id="loader">
      <div class="spinner"></div>
      <p>読み込み中…</p>
    </div>

    <!-- Profile stage — same structure as profile.html -->
    <div class="m-stage hidden" id="pMain">
      <div class="m-side m-side-right">
        <div class="m-kaimyo hidden" id="pKaimyo"></div>
        <h1 class="m-name" id="pName"></h1>
      </div>
      <div class="m-center">
        <div class="m-photo" id="pPhoto">
          <div class="p-slides" id="pSlides"></div>
          <div class="p-no-photo hidden" id="pNoPhoto">
            <div class="p-initials" id="pInitials"></div>
          </div>
        </div>
        <div class="m-dots hidden" id="pDots"></div>
      </div>
      <div class="m-side m-side-left">
        <div class="m-info hidden" id="pDeathBlock">
          <span class="m-info-label" id="pDeathLabel">没日</span>
          <span class="m-info-value" id="pDeathDate"></span>
        </div>
        <div class="m-info hidden" id="pAgeBlock">
          <span class="m-info-label" id="pAgeLabel">享年</span>
          <span class="m-info-value" id="pAge"></span>
        </div>
        <div class="m-info hidden" id="pPlotBlock">
          <span class="m-info-label" id="pPlotLabel">区画</span>
          <span class="m-info-value" id="pPlot"></span>
        </div>
      </div>
    </div>

    <!-- Bottom navigation bar -->
    <div class="sld-nav" id="sldNav" style="display:none">
      <button class="sld-nav-btn" id="sldPrev">◀ 前の方</button>
      <span class="sld-counter"   id="sldCounter">1 / 1</span>
      <button class="sld-details-btn" id="sldDetails">詳細を見る</button>
      <button class="sld-nav-btn" id="sldNext">次の方 ▶</button>
    </div>

    <script type="module">
      import {
        getPersonById,
        getDocs,
        getDoc,
        doc,
        db,
        COLLECTIONS,
        personMediaCollection,
      } from "./js/firebase.js";
      import { applyTenantBackground } from "./js/tenant-bg.js";

      // ── Helpers ──────────────────────────────────────────────────────────

      const KANJI = ['〇','一','二','三','四','五','六','七','八','九'];

      function toKanji(n) {
        n = Number(n);
        if (!Number.isFinite(n) || n < 0) return '';
        if (n === 0) return KANJI[0];
        const units = ['','十','百','千'];
        let s = '';
        const str = String(n);
        for (let i = 0; i < str.length; i++) {
          const d = Number(str[i]);
          const u = str.length - 1 - i;
          if (d === 0) continue;
          if (!(d === 1 && u > 0)) s += KANJI[d];
          s += units[u];
        }
        return s;
      }

      function toEraDate(iso) {
        if (!iso) return '';
        const [y, m, d] = iso.split('-').map(Number);
        if (!y || !m || !d) return '';
        let era, ey;
        if      (y >= 2019) { era = '令和'; ey = y - 2018; }
        else if (y >= 1989) { era = '平成'; ey = y - 1988; }
        else if (y >= 1926) { era = '昭和'; ey = y - 1925; }
        else if (y >= 1912) { era = '大正'; ey = y - 1911; }
        else                { era = '明治'; ey = y - 1867; }
        return `${era}${ey === 1 ? '元' : toKanji(ey)}年${toKanji(m)}月${toKanji(d)}日`;
      }

      function computeAge(birthIso, deathIso) {
        if (!birthIso || !deathIso) return null;
        const b = new Date(birthIso), d = new Date(deathIso);
        if (isNaN(b) || isNaN(d)) return null;
        let age = d.getFullYear() - b.getFullYear();
        const mo = d.getMonth() - b.getMonth();
        if (mo < 0 || (mo === 0 && d.getDate() < b.getDate())) age--;
        return age >= 0 ? age : null;
      }

      function set(id, text)  { const el = document.getElementById(id); if (el) el.textContent = text || ''; }
      function show(id)       { document.getElementById(id)?.classList.remove('hidden'); }
      function hide(id)       { document.getElementById(id)?.classList.add('hidden'); }

      // ── State ────────────────────────────────────────────────────────────

      let members       = [];
      let currentIndex  = 0;
      const mediaCache  = {};
      let autoTimer     = null;
      let isAnimating   = false;
      const AUTO_MS     = 5000;
      const FADE_OUT_MS = 400;
      const FADE_IN_MS  = 900;
      let tenantBgUrl   = null; // saved after applyTenantBackground resolves

      function applyPersonBg(person) {
        if (person.background_url) {
          document.body.style.setProperty('--tenant-bg-url', `url("${person.background_url}")`);
          document.body.classList.add('has-tenant-bg');
        } else if (tenantBgUrl) {
          document.body.style.setProperty('--tenant-bg-url', tenantBgUrl);
          document.body.classList.add('has-tenant-bg');
        } else {
          document.body.classList.remove('has-tenant-bg');
        }
      }

      const lang = sessionStorage.getItem('kiosk_lang') || 'ja';
      const ja   = lang !== 'en';

      document.body.classList.toggle('lang-ja', ja);
      document.body.classList.toggle('lang-en', !ja);
      document.documentElement.lang = lang;

      // ── Media loader ─────────────────────────────────────────────────────

      async function getMedia(personId) {
        if (mediaCache[personId]) return mediaCache[personId];
        try {
          const snap = await getDocs(personMediaCollection(personId));
          const media = snap.docs
            .map(d => ({ id: d.id, ...d.data() }))
            .sort((a, b) => (a.display_order ?? 0) - (b.display_order ?? 0));
          mediaCache[personId] = media;
          return media;
        } catch (_) { return []; }
      }

      // ── Render ───────────────────────────────────────────────────────────

      function renderSlide(person, media) {
        applyPersonBg(person);
        const photos = media.filter(m => m.file_type === 'photo' && m.storage_url);

        // Name
        const name = ja
          ? `${person.last_name || ''}　${person.first_name || ''}`.trim()
          : `${person.first_name || ''} ${person.last_name || ''}`.trim();
        set('pName', name);

        // Kaimyo
        const kaimyo = person.kaimyo || person.posthumous_name || '';
        if (kaimyo) { set('pKaimyo', kaimyo); show('pKaimyo'); }
        else hide('pKaimyo');

        // Death date
        if (person.death_date) {
          set('pDeathLabel', ja ? '没日' : 'Passed');
          set('pDeathDate', ja ? toEraDate(person.death_date) : person.death_date);
          show('pDeathBlock');
        } else hide('pDeathBlock');

        // Age
        const age = computeAge(person.birth_date, person.death_date);
        if (age != null) {
          set('pAgeLabel', ja ? '享年' : 'Age');
          set('pAge', ja ? `${toKanji(age)}歳` : String(age));
          show('pAgeBlock');
        } else hide('pAgeBlock');

        // Plot
        if (person.plot) {
          set('pPlotLabel', ja ? '区画' : 'Plot');
          set('pPlot', person.plot);
          show('pPlotBlock');
        } else hide('pPlotBlock');

        // Photos
        document.getElementById('pSlides').innerHTML = '';
        document.getElementById('pDots').innerHTML   = '';
        hide('pDots');

        if (photos.length) {
          hide('pNoPhoto');

          photos.forEach((p, i) => {
            const img = document.createElement('img');
            img.src       = p.storage_url;
            img.alt       = '';
            img.className = 'p-slide' + (i === 0 ? ' active' : '');
            document.getElementById('pSlides').appendChild(img);
          });

          if (photos.length > 1) {
            show('pDots');
            photos.forEach((_, i) => {
              const dot = document.createElement('div');
              dot.className = 'p-dot' + (i === 0 ? ' active' : '');
              document.getElementById('pDots').appendChild(dot);
            });
          }
        } else {
          show('pNoPhoto');
          const initials = ((person.last_name || '').charAt(0) + (person.first_name || '').charAt(0)).toUpperCase() || '✦';
          set('pInitials', initials);
        }

        // Page title
        document.title = `${name.replace('　', ' ')} — SmartSenior`;
      }

      // ── Auto-advance ─────────────────────────────────────────────────────

      function startAuto() {
        clearInterval(autoTimer);
        autoTimer = setInterval(() => {
          const next = (currentIndex + 1) % members.length;
          goTo(next);
        }, AUTO_MS);
      }

      // ── Navigation ───────────────────────────────────────────────────────

      function updateNav() {
        const prev = document.getElementById('sldPrev');
        const next = document.getElementById('sldNext');
        const counter = document.getElementById('sldCounter');
        prev.disabled = currentIndex === 0;
        next.disabled = currentIndex === members.length - 1;
        counter.textContent = `${currentIndex + 1} / ${members.length}`;
      }

      async function goTo(newIndex) {
        if (newIndex < 0 || newIndex >= members.length) return;
        if (isAnimating) return;
        isAnimating = true;

        const stage = document.getElementById('pMain');

        // Cancel the entry animation so inline opacity takes effect
        stage.style.animation = 'none';

        // Fade out
        stage.style.transition = `opacity ${FADE_OUT_MS}ms ease`;
        stage.style.opacity = '0';
        await new Promise(r => setTimeout(r, FADE_OUT_MS));

        currentIndex = newIndex;
        const person = members[currentIndex];
        const media  = await getMedia(person.id);
        renderSlide(person, media);
        updateNav();

        // Wait for images to load so text and photo appear together
        const imgs = stage.querySelectorAll('img');
        await Promise.all([...imgs].map(img =>
          img.complete ? Promise.resolve() :
          new Promise(r => { img.onload = r; img.onerror = r; })
        ));

        // Fade in — slower for a softer feel
        stage.style.transition = `opacity ${FADE_IN_MS}ms ease-in-out`;
        stage.style.opacity = '1';
        await new Promise(r => setTimeout(r, FADE_IN_MS));

        isAnimating = false;
        startAuto();
      }

      // ── Boot ─────────────────────────────────────────────────────────────

      const params   = new URLSearchParams(window.location.search);
      const personId = params.get('person');
      const loader   = document.getElementById('loader');

      function showError(msg) {
        loader.classList.add('hidden');
        document.body.insertAdjacentHTML('beforeend', `
          <div class="p-error">
            <p>${msg}</p>
            <a href="index.html">${ja ? '← 検索に戻る' : '← Return to search'}</a>
          </div>`);
      }

      // Back / End Visit
      document.getElementById('snavBack').textContent = ja ? '◀ 戻る' : '◀ Back';
      document.getElementById('snavBack').addEventListener('click', () => {
        const rootId = personId || '';
        window.location.href = `family.html?person=${rootId}&site=${window.__ENV__.TENANT_ID}`;
      });

      document.getElementById('snavEnd').textContent = ja ? '参拝終了' : 'End Visit';
      document.getElementById('snavEnd').addEventListener('click', () => {
        window.location.href = `thankyou.html?site=${window.__ENV__.TENANT_ID}`;
      });

      // Slide navigation
      document.getElementById('sldPrev').addEventListener('click', () => goTo(currentIndex - 1));
      document.getElementById('sldNext').addEventListener('click', () => goTo(currentIndex + 1));

      document.getElementById('sldDetails').textContent = ja ? '詳細を見る' : 'Full Profile';
      document.getElementById('sldDetails').addEventListener('click', () => {
        const person = members[currentIndex];
        if (person) {
          window.location.href = `profile.html?person=${person.id}&via=slideshow&site=${window.__ENV__.TENANT_ID}`;
        }
      });

      // Load family
      if (!personId) {
        showError(ja ? 'ご家族の情報が指定されていません。' : 'No family specified.');
      } else {
        (async () => {
          try {
            await applyTenantBackground();
            tenantBgUrl = document.body.style.getPropertyValue('--tenant-bg-url') || null;

            const root = await getPersonById(personId);
            if (!root) {
              showError(ja ? '記録が見つかりませんでした。' : 'Memorial not found.');
              return;
            }

            const allIds   = [root.id, ...(root.related_persons || [])];
            const snaps    = await Promise.all(allIds.map(id => getDoc(doc(db, COLLECTIONS.persons, id))));
            members        = snaps.filter(s => s.exists()).map(s => ({ id: s.id, ...s.data() }));

            if (!members.length) {
              showError(ja ? 'ご家族の記録が見つかりませんでした。' : 'Family records not found.');
              return;
            }

            // Pre-load media for the first member
            const media = await getMedia(members[0].id);
            renderSlide(members[0], media);

            loader.classList.add('hidden');
            const stage = document.getElementById('pMain');
            stage.classList.remove('hidden');
            stage.style.opacity = '1';

            if (members.length > 1) {
              document.getElementById('sldNav').style.display = 'flex';
              updateNav();
              startAuto();
            }
          } catch (err) {
            console.error('[slideshow]', err);
            showError(ja ? '読み込みに失敗しました。' : 'Something went wrong.');
          }
        })();
      }

      // ── QR / barcode scanner (HID keyboard emulator) ──────────────────
      (function () {
        function tryNavigate(scanned) {
          const s = scanned.trim();
          if (s.includes('family.html') && s.includes('person=')) {
            try { window.location.href = new URL(s).href; } catch (_) {}
          }
        }
        let buf = '';
        let timer = null;
        const TIMEOUT = 150;
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            clearTimeout(timer);
            const scanned = buf; buf = '';
            tryNavigate(scanned);
          } else if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
            buf += e.key;
            clearTimeout(timer);
            timer = setTimeout(() => { buf = ''; }, TIMEOUT);
          }
        });
        document.addEventListener('paste', (e) => {
          tryNavigate((e.clipboardData || window.clipboardData).getData('text'));
        });
      })();
    </script>
  </body>
</html>
