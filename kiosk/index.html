<!doctype html>
<html lang="ja" class="kiosk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>SmartSenior — 電子墓誌検索</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="SmartSenior" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#0071e3" />
    <link rel="stylesheet" href="css/style.css?v=3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="css/kiosk.css?v=75" />
    <!-- Pins this kiosk to its memorial site (tenant). Runs before modules. -->
    <script src="js/config.js"></script>
  </head>
  <body>
    <!-- ══════════════════════════════════════════════════════
         HOME SCREEN
         ═══════════════════════════════════════════════════ -->
    <div id="screen-home" class="screen screen-home">
      <div class="home-greeting">
        <p class="home-greeting-main" data-i18n="greetingMain"></p>
        <p class="home-greeting-sub" data-i18n="greetingSub"></p>
      </div>

      <div class="home-cta">
        <button
          class="home-start-btn"
          id="startBtn"
          data-i18n="startBtn"
        ></button>
        <p class="home-start-hint" data-i18n="startHint"></p>
      </div>

      <p class="home-ic-note" data-i18n="icNote"></p>
    </div>

    <!-- ══════════════════════════════════════════════════════
         SEARCH SCREEN
         ═══════════════════════════════════════════════════ -->
    <div id="screen-search" class="screen screen-search hidden">
      <!-- Floating back button -->
      <button
        class="m-btn-back search-back-btn"
        id="backBtn"
        data-i18n="backBtn"
      ></button>

      <!-- Search input -->
      <div class="search-input-row">
        <div class="search-input-wrap">
          <input
            type="text"
            id="searchInput"
            inputmode="none"
            autocomplete="off"
            spellcheck="false"
            aria-label="Search"
            readonly
          />
          <button
            class="search-clear-btn"
            id="searchClearBtn"
            aria-label="Clear"
          >
            ✕
          </button>
        </div>
        <button
          class="search-go-btn"
          id="searchButton"
          data-i18n="searchBtn"
        ></button>
      </div>

      <!-- Body: keyboard (left) + results (right) -->
      <div class="search-body">
        <!-- Keyboard -->
        <div class="keyboard-area" id="keyboardArea">
          <div class="kb-body">
            <div class="kb-main" id="kbMain"></div>
            <div class="kb-special" id="kbSpecial"></div>
          </div>
          <div class="kb-bottom">
            <button class="kb-space" id="kbSpace" data-i18n="spaceBtn"></button>
            <button
              class="kb-clear-all"
              id="kbClearAll"
              data-i18n="clearAllBtn"
            ></button>
          </div>
        </div>

        <!-- Results -->
        <div
          class="search-results-panel kiosk-scroll"
          id="results"
          aria-live="polite"
        ></div>
      </div>
    </div>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch(function (e) {
          console.warn("[SW] registration failed:", e);
        });
      }
    </script>

    <script type="module">
      import { initSearchScreen } from "./js/search.js";
      import { applyTenantBackground } from "./js/tenant-bg.js";

      // ── Translations ──────────────────────────────────────────────────
      const STRINGS = {
        greetingMain: "ご来館ありがとうございます。",
        greetingSub: "お名前を検索して墓誌をご覧ください",
        startBtn: "氏名で検索",
        startHint: "納骨場所の番号もご確認いただけます",
        icNote: "※ ICカードをお持ちの方は\nカードリーダーにかざしてください",
        backBtn: "◀ 戻る",
        searchTitle: "名前検索（姓 → 名と入力）",
        searchSub: "姓のみ・名のみ・途中までの入力でも検索できます",
        endVisit: "参拝終了",
        searchPlaceholder: "氏名を入力してください",
        searchBtn: "検索",
        spaceBtn: "スペース",
        clearAllBtn: "全消去",
        noResults:
          "該当する方が見つかりませんでした。<br>別のお名前や姓のみでお試しください。",
        unavailable: "現在検索を利用できません。",
      };

      function t(key) {
        return STRINGS[key] || key;
      }

      function applyText() {
        // Update all data-i18n elements
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.dataset.i18n;
          el.textContent = t(key);
        });

        // Placeholder needs setAttribute
        document.getElementById("searchInput").placeholder =
          t("searchPlaceholder");

        buildKeyboard();
      }

      // ── Keyboard layouts ──────────────────────────────────────────────

      const KB_HIRAGANA_ROWS = [
        ["あ", "か", "さ", "た", "な", "は", "ま", "や", "ら", "わ"],
        ["い", "き", "し", "ち", "に", "ひ", "み", "ゆ", "り", "を"],
        ["う", "く", "す", "つ", "ぬ", "ふ", "む", "よ", "る", "ん"],
        ["え", "け", "せ", "て", "ね", "へ", "め", null, "れ", null],
        ["お", "こ", "そ", "と", "の", "ほ", "も", "ろ", null, null],
        ["ぁ", "ぃ", "ぅ", "ぇ", "ぉ", "ゃ", "ゅ", "ょ", "っ", "ゎ"],
      ];

      // Special column — flex-fills the same height as the main grid
      const KB_HIRAGANA_SPECIAL = [
        { type: "action", action: "bs", label: "⌫" },
        { type: "empty" },
        { type: "action", action: "left", label: "←" },
        { type: "action", action: "right", label: "→" },
        { type: "action", action: "dakuten", label: "゛" },
        { type: "action", action: "handakuten", label: "゜" },
        { type: "char", char: "ー", label: "ー" },
        { type: "char", char: "・", label: "・" },
      ];

      // Dakuten (voiced) combining map
      const DAKUTEN_MAP = {
        か: "が",
        き: "ぎ",
        く: "ぐ",
        け: "げ",
        こ: "ご",
        さ: "ざ",
        し: "じ",
        す: "ず",
        せ: "ぜ",
        そ: "ぞ",
        た: "だ",
        ち: "ぢ",
        つ: "づ",
        て: "で",
        と: "ど",
        は: "ば",
        ひ: "び",
        ふ: "ぶ",
        へ: "べ",
        ほ: "ぼ",
        う: "ゔ",
      };
      // Handakuten (semi-voiced) combining map
      const HANDAKUTEN_MAP = {
        は: "ぱ",
        ひ: "ぴ",
        ふ: "ぷ",
        へ: "ぺ",
        ほ: "ぽ",
      };

      function buildKeyboard() {
        const grid = document.getElementById("kbMain");
        const special = document.getElementById("kbSpecial");
        grid.innerHTML = "";
        special.innerHTML = "";

        const rows = KB_HIRAGANA_ROWS;
        const specialDefs = KB_HIRAGANA_SPECIAL;

        // Set column count via inline style so grid adapts
        const colCount = rows[0].length;
        grid.style.gridTemplateColumns = `repeat(${colCount}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${rows.length}, 1fr)`;

        rows.forEach((row) => {
          row.forEach((ch) => {
            const btn = document.createElement("button");
            btn.className = ch ? "kb-key" : "kb-key empty";
            btn.textContent = ch || "";
            if (ch) btn.dataset.char = ch;
            grid.appendChild(btn);
          });
        });

        specialDefs.forEach((spec) => {
          const btn = document.createElement("button");
          if (spec.type === "empty") {
            btn.className = "kb-key empty";
            btn.disabled = true;
          } else if (spec.type === "action") {
            btn.className = "kb-key action";
            btn.innerHTML = spec.sub
              ? `${spec.label}<span class="kb-key-sub">${spec.sub}</span>`
              : spec.label;
            btn.dataset.action = spec.action;
          } else {
            btn.className = "kb-key";
            btn.textContent = spec.label;
            btn.dataset.char = spec.char;
          }
          special.appendChild(btn);
        });
      }

      // ── Keyboard input ────────────────────────────────────────────────
      const input = document.getElementById("searchInput");

      function getCaretPos() {
        return typeof input.selectionStart === "number"
          ? input.selectionStart
          : input.value.length;
      }
      function setCaretPos(pos) {
        try {
          input.setSelectionRange(pos, pos);
        } catch (_) {}
      }

      function handleKeyInput(e) {
        const btn = e.target.closest("[data-char],[data-action]");
        if (!btn) return;
        const ch = btn.dataset.char;
        const action = btn.dataset.action;
        const val = input.value;
        const pos = getCaretPos();

        if (ch) {
          input.value = val.slice(0, pos) + ch + val.slice(pos);
          setCaretPos(pos + 1);
        } else if (action === "dakuten") {
          if (pos > 0) {
            const voiced = DAKUTEN_MAP[val[pos - 1]];
            if (voiced) {
              input.value = val.slice(0, pos - 1) + voiced + val.slice(pos);
              setCaretPos(pos);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              return;
            }
          }
          return; // no-op if previous char can't take dakuten
        } else if (action === "handakuten") {
          if (pos > 0) {
            const semi = HANDAKUTEN_MAP[val[pos - 1]];
            if (semi) {
              input.value = val.slice(0, pos - 1) + semi + val.slice(pos);
              setCaretPos(pos);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              return;
            }
          }
          return; // no-op if previous char can't take handakuten
        } else if (action === "bs") {
          if (pos > 0) {
            input.value = val.slice(0, pos - 1) + val.slice(pos);
            setCaretPos(pos - 1);
          }
        } else if (action === "left") {
          setCaretPos(Math.max(0, pos - 1));
        } else if (action === "right") {
          setCaretPos(Math.min(val.length, pos + 1));
        }
        input.dispatchEvent(new Event("input", { bubbles: true }));
      }

      document
        .getElementById("kbMain")
        .addEventListener("click", handleKeyInput);
      document
        .getElementById("kbSpecial")
        .addEventListener("click", handleKeyInput);

      document.getElementById("kbSpace").addEventListener("click", () => {
        const pos = getCaretPos();
        const val = input.value;
        const sp = "　"; // full-width space
        input.value = val.slice(0, pos) + sp + val.slice(pos);
        setCaretPos(pos + 1);
        input.dispatchEvent(new Event("input", { bubbles: true }));
      });

      const clearInput = () => {
        input.value = "";
        input.dispatchEvent(new Event("input", { bubbles: true }));
        document.getElementById("results").innerHTML = "";
      };

      document
        .getElementById("kbClearAll")
        .addEventListener("click", clearInput);
      document
        .getElementById("searchClearBtn")
        .addEventListener("click", clearInput);

      // ── Layout vars (topbar + input row heights) ─────────────────────
      const keyboardArea = document.getElementById("keyboardArea");
      const searchScreen2 = document.getElementById("screen-search");
      const resultsEl = document.getElementById("results");

      function measureLayout() {
        // Layout is now handled by flex — nothing to calculate
      }

      // ── Keyboard ──────────────────────────────────────────────────────
      // The kiosk tablet has no physical keyboard, so it gets the custom
      // on-screen kana grid and the input stays locked (readonly +
      // inputmode=none) to keep the native one from opening. A phone has a
      // native IME that handles Japanese better, so below this breakpoint we
      // release the lock and let it take over; kiosk.css hides the grid to
      // match. Must stay in sync with the 700px breakpoint in kiosk.css.
      const useNativeKeyboard = window.matchMedia("(max-width: 700px)").matches;

      if (useNativeKeyboard) {
        input.removeAttribute("readonly");
        input.removeAttribute("inputmode");
      }

      function openKeyboard() {
        if (useNativeKeyboard) return;
        keyboardArea.classList.add("open");
      }

      function closeKeyboard() {
        keyboardArea.classList.remove("open");
      }

      // ── Results panel: auto show/hide ────────────────────────────────
      new MutationObserver(() => {
        const hasResults = resultsEl.children.length > 0;
        resultsEl.classList.toggle("panel-open", hasResults);
      }).observe(resultsEl, { childList: true });

      // ── Screen navigation ─────────────────────────────────────────────
      const homeScreen = document.getElementById("screen-home");
      const searchScreen = document.getElementById("screen-search");

      function showSearch() {
        homeScreen.classList.add("hidden");
        searchScreen.classList.remove("hidden");
        // openKeyboard first so the keyboard is rendered before we measure its height
        requestAnimationFrame(() => {
          openKeyboard();
          measureLayout();
        });
      }
      function showHome() {
        const site = window.__ENV__?.TENANT_ID || "";
        window.location.href = site ? `index.html?site=${site}` : "index.html";
      }

      document.getElementById("startBtn").addEventListener("click", showSearch);
      document.getElementById("backBtn").addEventListener("click", showHome);

      // Re-measure on resize (handles Surface Pro zoom / orientation changes)
      window.addEventListener("resize", () => {
        if (!searchScreen.classList.contains("hidden")) {
          measureLayout();
        }
      });

      // ── Boot ──────────────────────────────────────────────────────────
      applyText();
      initSearchScreen();

      // Page is invisible (bg-loading opacity:0) until this resolves.
      applyTenantBackground();

      // Restore search screen if coming back from family/profile page
      if (
        new URLSearchParams(window.location.search).get("restore") === "search"
      ) {
        showSearch();
        const lastQuery = sessionStorage.getItem("kiosk_last_query");
        if (lastQuery) {
          const searchInput = document.getElementById("searchInput");
          if (searchInput) {
            searchInput.value = lastQuery;
            searchInput.dispatchEvent(new Event("input", { bubbles: true }));
          }
        }
      }

      // ── QR / barcode scanner (HID keyboard emulator) ──────────────────
      // Scanners act as keyboards (keystroke mode) or paste the URL directly.
      // We handle both.
      (function () {
        function tryNavigate(scanned) {
          const s = scanned.trim();
          if (!s) return;
          if (
            (s.includes("family") || s.includes("person=")) &&
            s.includes("person=")
          ) {
            try {
              const url = new URL(s);
              const personId = url.searchParams.get("person");
              if (personId) {
                window.location.href = `family.html?person=${encodeURIComponent(personId)}`;
              }
            } catch (_) {
              // Relative URL fallback
              const id = new URLSearchParams(s.split("?")[1] || "").get(
                "person",
              );
              if (id)
                window.location.href = `family.html?person=${encodeURIComponent(id)}`;
            }
          }
        }

        // Keystroke mode: scanner types char-by-char then sends Enter
        let buf = "";
        let timer = null;
        const TIMEOUT = 150;
        document.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            clearTimeout(timer);
            const scanned = buf;
            buf = "";
            tryNavigate(scanned);
          } else if (
            e.key.length === 1 &&
            !e.ctrlKey &&
            !e.altKey &&
            !e.metaKey
          ) {
            buf += e.key;
            clearTimeout(timer);
            timer = setTimeout(() => {
              buf = "";
            }, TIMEOUT);
          }
        });

        // Paste mode: some scanners paste the full URL at once
        document.addEventListener("paste", (e) => {
          const text = (e.clipboardData || window.clipboardData).getData(
            "text",
          );
          tryNavigate(text);
        });
      })();
    </script>
  </body>
</html>
