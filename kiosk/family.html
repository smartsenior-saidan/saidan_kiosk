<!DOCTYPE html>
<html lang="ja" class="kiosk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ご家族 — SmartSenior</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SmartSenior" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#0071e3" />
    <link rel="stylesheet" href="css/style.css?v=3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="css/kiosk.css?v=18" />
    <script src="js/config.js"></script>
  </head>
  <body class="family-page lang-ja">

    <button class="m-btn-back" id="fnavBack">◀ 戻る</button>
    <button class="m-btn-end"  id="fnavEnd">参拝終了</button>

    <div class="f-loader" id="loader">
      <div class="spinner"></div>
      <p>読み込み中…</p>
    </div>

    <div class="f-stage hidden" id="fMain">
      <h1 class="f-family-name" id="fFamilyName"></h1>
      <p  class="f-subtitle"    id="fSubtitle">お参りする故人を選択してください</p>

      <div class="f-members" id="fMembers"></div>

      <button class="f-slideshow-btn" id="fnavSlideshow">スライドショー ▶</button>
    </div>

    <script type="module">
      import { getPersonById, getDocs, getDoc, doc, db, where, tenantQuery, COLLECTIONS } from "./js/firebase.js";
      import { applyTenantBackground } from "./js/tenant-bg.js";
      applyTenantBackground();

      const lang = sessionStorage.getItem('kiosk_lang') || 'ja';
      const ja   = lang !== 'en';

      document.getElementById('fnavBack').textContent = ja ? '◀ 戻る' : '◀ Back';
      document.getElementById('fnavBack').addEventListener('click', () => {
        window.location.href = `index.html?restore=search&site=${window.__ENV__.TENANT_ID}`;
      });
      document.getElementById('fnavEnd').textContent = ja ? '参拝終了' : 'End Visit';
      document.getElementById('fnavEnd').addEventListener('click', () => {
        window.location.href = `thankyou.html?site=${window.__ENV__.TENANT_ID}`;
      });

      document.getElementById('fnavSlideshow').textContent = ja ? 'スライドショー ▶' : 'Slideshow ▶';
      document.getElementById('fnavSlideshow').addEventListener('click', () => {
        window.location.href = `slideshow.html?person=${encodeURIComponent(personId)}&site=${window.__ENV__.TENANT_ID}`;
      });
      document.getElementById('fSubtitle').textContent = ja
        ? 'お参りする故人を選択してください'
        : 'Select a family member to view their memorial';

      document.body.classList.toggle('lang-ja', ja);
      document.body.classList.toggle('lang-en', !ja);
      document.documentElement.lang = lang;

      const params   = new URLSearchParams(window.location.search);
      const personId = params.get('person');
      const loader   = document.getElementById('loader');
      const main     = document.getElementById('fMain');

      function showError(msg) {
        loader.classList.add('hidden');
        document.body.insertAdjacentHTML('beforeend', `
          <div class="p-error">
            <p>${msg}</p>
            <a href="index.html">${ja ? '← 検索に戻る' : '← Return to search'}</a>
          </div>`);
      }

      if (!personId) {
        showError(ja ? 'ご家族の情報が指定されていません。' : 'No family specified.');
      } else {
        (async () => {
          try {
            const root = await getPersonById(personId);
            if (!root) { showError(ja ? '記録が見つかりませんでした。' : 'Memorial not found.'); return; }

            // Collect all member IDs: root + related
            const relatedIds = root.related_persons || [];
            const allIds = [root.id, ...relatedIds];

            // Fetch all members
            const fetches = allIds.map((id) => getDoc(doc(db, COLLECTIONS.persons, id)));
            const snaps   = await Promise.all(fetches);
            const members = snaps.filter((s) => s.exists()).map((s) => ({ id: s.id, ...s.data() }));

            // Family name: use shared last_name from root
            const familyNameText = ja
              ? `${root.last_name || ''}家`
              : `${root.last_name || ''} Family`;
            document.getElementById('fFamilyName').textContent = familyNameText;
            document.title = `${familyNameText} — SmartSenior`;

            // Render member buttons
            const membersEl = document.getElementById('fMembers');
            membersEl.innerHTML = members.map((m) => {
              const name = ja
                ? `${m.last_name || ''}　${m.first_name || ''}`.trim()
                : `${m.first_name || ''} ${m.last_name || ''}`.trim();
              const years = m.birth_date || m.death_date
                ? `${(m.birth_date || '').slice(0,4) || '?'} – ${(m.death_date || '').slice(0,4) || '?'}`
                : '';
              return `
                <button class="f-member-btn" data-id="${m.id}">
                  <span class="f-member-name">${name}</span>
                  ${years ? `<span class="f-member-years">${years}</span>` : ''}
                </button>`;
            }).join('');

            membersEl.querySelectorAll('.f-member-btn').forEach((btn) => {
              btn.addEventListener('click', () => {
                window.location.href = `profile.html?person=${btn.dataset.id}&via=family&site=${window.__ENV__.TENANT_ID}`;
              });
            });

            loader.classList.add('hidden');
            main.classList.remove('hidden');
          } catch (err) {
            console.error('[family]', err);
            showError(ja ? '読み込みに失敗しました。' : 'Something went wrong.');
          }
        })();
      }

      // ── QR / barcode scanner (HID keyboard emulator) ──────────────────
      (function () {
        let buf = '';
        let timer = null;
        const TIMEOUT = 150;
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            clearTimeout(timer);
            const scanned = buf.trim();
            buf = '';
            if (scanned.includes('family.html') && scanned.includes('person=')) {
              try { window.location.href = new URL(scanned).href; } catch (_) {}
            }
          } else if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
            buf += e.key;
            clearTimeout(timer);
            timer = setTimeout(() => { buf = ''; }, TIMEOUT);
          }
        });
      })();
    </script>
  </body>
</html>
