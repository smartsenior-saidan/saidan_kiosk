<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — SmartSenior</title>
    <!-- Resolve theme before paint to avoid a flash of the wrong mode -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("ss_theme");
          var t = s || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="css/login.css?v=5" />
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">

        <div class="login-brand">
          <div class="login-logo">S</div>
          <h1 class="login-title">SmartSenior</h1>
          <p class="login-subtitle">Admin Portal</p>
        </div>

        <div id="loginStatus" class="login-status hidden"></div>

        <form id="loginForm" autocomplete="on" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              placeholder="you@temple.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input
              id="password"
              type="password"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
          </div>

          <button id="signInBtn" type="submit" class="btn-primary">
            Sign In
          </button>
        </form>

        <button id="forgotBtn" type="button" class="btn-forgot">
          Forgot password?
        </button>

      </div>
    </div>

    <script type="module" src="js/login.js?v=3"></script>
  </body>
</html>
